<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Offline</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #7B1FA2;      /* สีม่วงเข้มละมุนขึ้น */
            --primary-light: #AB47BC;      /* สีม่วงสว่าง */
            --secondary-color: #FFC107;    /* สีเหลืองทองนวลๆ */
            --bg-gradient: linear-gradient(135deg, #FCE4EC 0%, #E1BEE7 100%);
            --text-main: #4A4A4A;
            --text-sub: #757575;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh; /* ใช้ min-height เผื่อจอมือถือสั้น */
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* เพิ่ม Padding ดันไม่ให้เนื้อหาติดขอบจอเด็ดขาด */
            padding: 20px; 
            position: relative;
        }

        /* ตกแต่งพื้นหลังสไตล์น่ารัก มินิมอล */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.5;
            z-index: 0;
            filter: blur(20px);
            animation: float-blob 8s ease-in-out infinite alternate;
        }
        
        .shape-1 {
            width: 300px; height: 300px;
            background: rgba(255, 193, 7, 0.3);
            top: -50px; right: -50px;
        }
        
        .shape-2 {
            width: 250px; height: 250px;
            background: rgba(123, 31, 162, 0.2);
            bottom: -50px; left: -50px;
            animation-delay: -4s;
        }

        /* กล่องการ์ดเนื้อหา (Glassmorphism ที่สวยขึ้น) */
        .grad-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6); /* เพิ่มขอบกระจก */
            border-radius: 35px;
            padding: 50px 30px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(123, 31, 162, 0.1), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            max-width: 420px; /* บีบกล่องให้เพรียวขึ้น */
            width: 100%;
            position: relative;
            z-index: 10;
            /* ดันขอบบนลงมา เผื่อพื้นที่ให้ไอคอนหมวกไม่ทะลุขอบจอ */
            margin-top: 60px; 
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* วงกลมไอคอนด้านบนการ์ด */
        .icon-box {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -100px auto 20px;
            border: 4px solid var(--secondary-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            position: relative;
            animation: float-cap 3.5s ease-in-out infinite;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: var(--primary-light);
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        p {
            color: var(--text-sub);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 0.95rem;
            padding: 0 10px;
        }

        /* ปุ่มกด */
        .btn-home {
            background-color: var(--primary-light);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(171, 71, 188, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-home:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 31, 162, 0.4);
        }

        /* ดาววิบวับรอบๆ การ์ด */
        .sparkle {
            position: absolute;
            animation: twinkle 2s infinite alternate;
            pointer-events: none;
        }
        .sp-1 { top: -10px; right: -15px; width: 35px; animation-delay: 0s; }
        .sp-2 { top: 60px; left: -20px; width: 25px; animation-delay: 1s; }
        .sp-3 { bottom: 30px; right: -15px; width: 25px; animation-delay: 0.5s; }

        /* Animations */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes float-blob {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        @keyframes float-cap {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes twinkle {
            0% { opacity: 0.4; transform: scale(0.8) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.1) rotate(15deg); filter: drop-shadow(0 0 6px rgba(255, 193, 7, 0.5)); }
        }

        /* Responsive สำหรับมือถือหน้าจอเล็ก */
        @media (max-width: 400px) {
            .grad-card {
                padding: 40px 20px 30px;
            }
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 0.95rem; }
            p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="grad-card">
        <svg class="sparkle sp-1" viewBox="0 0 24 24" fill="#FFC107"><path d="M12 1L14.5 8.5L22 11L14.5 13.5L12 21L9.5 13.5L2 11L9.5 8.5L12 1Z"/></svg>
        <svg class="sparkle sp-2" viewBox="0 0 24 24" fill="#FFC107"><path d="M12 1L14.5 8.5L22 11L14.5 13.5L12 21L9.5 13.5L2 11L9.5 8.5L12 1Z"/></svg>
        <svg class="sparkle sp-3" viewBox="0 0 24 24" fill="#AB47BC"><path d="M12 1L14.5 8.5L22 11L14.5 13.5L12 21L9.5 13.5L2 11L9.5 8.5L12 1Z"/></svg>

        <div class="icon-box">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 60px; height: 60px;">
                <path d="M10 45L50 25L90 45L50 65L10 45Z" fill="#7B1FA2"/>
                <path d="M90 45L50 65L10 45L50 50L90 45Z" fill="#4A148C"/>
                <path d="M25 52V70C25 81.0457 36.1929 90 50 90C63.8071 90 75 81.0457 75 70V52" fill="#AB47BC"/>
                <path d="M50 45L80 60" stroke="#FFC107" stroke-width="4" stroke-linecap="round"/>
                <circle cx="50" cy="45" r="5" fill="#FFC107"/>
                <path d="M76 60L84 60L82 75L78 75L76 60Z" fill="#FFC107"/>
            </svg>
        </div>

        <h1>System Offline</h1>
        <div class="subtitle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#FFC107">
                <path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.62L12 2L9.19 8.62L2 9.24L7.45 13.97L5.82 21L12 17.27Z"/>
            </svg>
            สำเร็จการศึกษา
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#FFC107">
                <path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.62L12 2L9.19 8.62L2 9.24L7.45 13.97L5.82 21L12 17.27Z"/>
            </svg>
        </div>

        <p>
            ระบบได้ปิดให้บริการอย่างเป็นทางการแล้ว<br>
            ขอบคุณสำหรับทุกความทรงจำดีๆ ที่ผ่านมา<br>
            ขอให้ทุกคนเติบโตอย่างงดงาม<br>และโชคดีในเส้นทางที่เลือกเดิน
        </p>

        
        <div class="mt-4 text-muted" style="margin-top: 20px; font-size: 0.75rem; color: #aaa;">
            &copy; 2026 TUBHOK, Muangsuratthani School.
        </div>
    </div>

</body>
</html>
